apiVersion: v1
kind: ServiceAccount
metadata:
  name: email-ruby
  namespace: arp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::977924542119:role/arp-email
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-ruby
  namespace: arp
  labels:
    app: email-ruby
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-ruby
  template:
    metadata:
      labels:
        app: email-ruby
    spec:
      serviceAccountName: email-ruby
      containers:
        - name: email-ruby
          image: 977924542119.dkr.ecr.us-east-1.amazonaws.com/arp/email-ruby:latest
          imagePullPolicy: Always
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: AWS_REGION
              value: us-east-1
            # Must be an SES-verified identity (sandbox). Used as the From address.
            - name: SES_SENDER
              value: anthony.wittig@gmail.com
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
