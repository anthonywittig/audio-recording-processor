# Namespace for the application workers, plus the summarize-go worker and its
# IRSA-bound ServiceAccount. The SA annotation ties it to the Terraform role
# (arp-summarize); the OIDC subject in that role's trust policy must match
# namespace/serviceaccount exactly (arp/summarize-go).
apiVersion: v1
kind: Namespace
metadata:
  name: arp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: summarize-go
  namespace: arp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::977924542119:role/arp-summarize
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarize-go
  namespace: arp
  labels:
    app: summarize-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: summarize-go
  template:
    metadata:
      labels:
        app: summarize-go
    spec:
      serviceAccountName: summarize-go
      containers:
        - name: summarize-go
          image: 977924542119.dkr.ecr.us-east-1.amazonaws.com/arp/summarize-go:latest
          imagePullPolicy: Always
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: OPENAI_SECRET_ID
              value: arp/openai-api-key
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
