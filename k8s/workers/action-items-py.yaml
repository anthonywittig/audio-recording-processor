apiVersion: v1
kind: ServiceAccount
metadata:
  name: action-items-py
  namespace: arp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::977924542119:role/arp-action-items
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-items-py
  namespace: arp
  labels:
    app: action-items-py
spec:
  replicas: 1
  selector:
    matchLabels:
      app: action-items-py
  template:
    metadata:
      labels:
        app: action-items-py
    spec:
      serviceAccountName: action-items-py
      containers:
        - name: action-items-py
          image: 977924542119.dkr.ecr.us-east-1.amazonaws.com/arp/action-items-py:latest
          imagePullPolicy: Always
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: OPENAI_SECRET_ID
              value: arp/openai-api-key
            - name: AWS_REGION
              value: us-east-1
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
